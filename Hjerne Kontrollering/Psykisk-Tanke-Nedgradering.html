<html>
<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">

    <title>Chat-Analyse // Nevralt Sammenbrudd</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    <style>
        :root {
            --bg-deep: #020205;
            --chat-cyan: #06b6d4;
            --breakdown-red: #f43f5e;
            --neural-amber: #f59e0b;
        }

        body {
            background-color: var(--bg-deep);
            color: #f8fafc;
            overflow: hidden;
            font-family: 'JetBrains Mono', monospace;
            touch-action: none;
        }

        .perspective-container {
            perspective: 2000px;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #0c0a09 0%, #020205 100%);
        }

        .stage-3d {
            position: relative;
            width: 95%;
            max-width: 1100px;
            height: 85vh;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        .glass-card {
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(245, 158, 11, 0.1);
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .chat-bubble {
            animation: slide-up 0.4s ease-out forwards;
        }

        @keyframes slide-up {
            from { opacity: 0; transform: translateY(10px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .signal-wave {
            stroke-dasharray: 100;
            animation: wave-flow 2s linear infinite;
        }

        @keyframes wave-flow {
            to { stroke-dashoffset: -200; }
        }

        .scanner-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neural-amber), transparent);
            position: absolute;
            width: 100%;
            top: 0;
            animation: scan 3s linear infinite;
            z-index: 20;
        }

        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .glow-node {
            filter: drop-shadow(0 0 8px var(--neural-amber));
        }
    </style>
</head>
<body>

    <nav class="fixed top-0 left-0 right-0 h-16 flex items-center justify-between px-10 z-50 border-b border-white/5 bg-black/80 backdrop-blur-xl">
        <div class="flex items-center gap-4">
            <div class="p-2 bg-amber-500/10 border border-amber-500/30 rounded-lg">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </div>
            <div>
                <h1 class="text-xs font-black tracking-widest text-amber-500 uppercase">Chat-Dekoding // Nevral Kollaps</h1>
                <div class="text-[8px] text-slate-500 font-mono">MQTT_TOPIC: /asund/neural/intercept</div>
            </div>
        </div>
        <div class="flex gap-8">
            <div class="text-right">
                <span class="text-[8px] text-slate-500 block uppercase">Sammenbrudd_Sannsynlighet</span>
                <span id="breakdown-meter" class="text-lg font-black text-rose-500 italic">4.2%</span>
            </div>
        </div>
    </nav>

    <div class="perspective-container">
        <div id="stage" class="stage-3d">
            
            <div class="absolute inset-0 grid grid-cols-12 gap-6 p-6 glass-card overflow-hidden">
                <div class="scanner-line"></div>
                
                <!-- Venstre: Chat-strøm (Analyseres) -->
                <div class="col-span-4 flex flex-col h-full bg-black/40 rounded-xl border border-white/5 p-4 relative overflow-hidden">
                    <h3 class="text-[10px] text-cyan-400 font-bold mb-4 uppercase flex items-center gap-2">
                        <span class="w-1.5 h-1.5 bg-cyan-400 rounded-full animate-pulse"></span>
                        Live Intercept_Data
                    </h3>
                    <div id="chat-stream" class="flex-1 space-y-3 overflow-hidden flex flex-col justify-end">
                        <!-- Chat bobler her -->
                    </div>
                </div>

                <!-- Midten: Nevral 3D-Visualisering -->
                <div class="col-span-5 flex flex-col relative">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-[9px] text-amber-500/80 font-bold uppercase">Kjerne_Prosessering</span>
                        <span class="text-[8px] text-slate-600">MODEL: TF_SOFTMAX_v4</span>
                    </div>
                    <div class="flex-1 bg-neutral-900/30 rounded-xl border border-white/5 relative overflow-hidden flex items-center justify-center">
                        <svg id="brain-core" viewBox="0 0 400 400" class="w-full h-full p-8">
                            <defs>
                                <filter id="glow">
                                    <feGaussianBlur stdDeviation="3" result="blur" />
                                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                                </filter>
                            </defs>
                            <!-- Abstrakt 3D-lignende SVG kjerne -->
                            <circle cx="200" cy="200" r="140" fill="none" stroke="rgba(245, 158, 11, 0.05)" stroke-width="1" />
                            <path id="neural-cloud" d="M200,200 m-100,0 a100,100 0 1,0 200,0 a100,100 0 1,0 -200,0" 
                                  fill="none" stroke="var(--neural-amber)" stroke-width="0.5" stroke-dasharray="2,4" />
                            
                            <!-- Pineal Gland (Pineapple kjerne) -->
                            <g transform="translate(200, 200)">
                                <circle id="pineal-node" r="15" fill="var(--neural-amber)" class="glow-node" />
                                <path id="pulse-ring" d="M0,0 m-20,0 a20,20 0 1,0 40,0 a20,20 0 1,0 -40,0" 
                                      fill="none" stroke="var(--breakdown-red)" stroke-width="1" opacity="0.5">
                                    <animate attributeName="r" from="20" to="80" dur="1.5s" repeatCount="indefinite" />
                                    <animate attributeName="opacity" from="0.5" to="0" dur="1.5s" repeatCount="indefinite" />
                                </path>
                            </g>

                            <!-- Signal linjer fra chat -->
                            <g id="hit-lines"></g>
                        </svg>
                    </div>
                </div>

                <!-- Høyre: Softmax Statistikk & Frekvens -->
                <div class="col-span-3 flex flex-col gap-4">
                    <div class="bg-black/60 border border-white/5 rounded-xl p-5 flex-1">
                        <h3 class="text-[10px] text-slate-400 font-bold mb-4 uppercase">Softmax_Distribusjon</h3>
                        <div id="stat-bars" class="space-y-4">
                            <!-- Dynamiske søyler -->
                        </div>
                    </div>
                    
                    <div class="bg-rose-950/20 border border-rose-500/20 rounded-xl p-5">
                        <h3 class="text-[10px] text-rose-500 font-bold mb-2 uppercase tracking-tighter">Psykisk Trykk_Vektor</h3>
                        <div id="pressure-gauge" class="h-1.5 w-full bg-slate-900 rounded-full overflow-hidden">
                            <div id="pressure-fill" class="h-full bg-rose-500 transition-all duration-700" style="width: 10%"></div>
                        </div>
                        <div class="mt-2 flex justify-between text-[8px] text-slate-500">
                            <span>STABIL</span>
                            <span>KRITISK</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        let model;
        const chatStream = document.getElementById('chat-stream');
        const breakdownMeter = document.getElementById('breakdown-meter');
        const statBars = document.getElementById('stat-bars');
        const pressureFill = document.getElementById('pressure-fill');
        const hitLines = document.getElementById('hit-lines');
        const stage = document.getElementById('stage');

        const chatMolecules = [
            { text: "Jeg føler meg helt alene i dette systemet.", weight: 0.8 },
            { text: "Ingen forstår de subjektive rettighetene mine.", weight: 0.7 },
            { text: "Det er som om 5G signalene snakker direkte til meg.", weight: 0.95 },
            { text: "Alt er bare en simulering av smerte.", weight: 0.85 },
            { text: "De overvåker tankene mine gjennom chatten.", weight: 0.9 },
            { text: "Jeg orker ikke kjempe mot frekvensene lenger.", weight: 0.98 }
        ];

        async function initNeuralScanner() {
            // TensorFlow Softmax Modell for å kategorisere emosjonell entropi
            model = tf.sequential();
            model.add(tf.layers.dense({ units: 32, activation: 'relu', inputShape: [4] }));
            model.add(tf.layers.dense({ units: 4, activation: 'softmax' })); // [Ro, Angst, Sinne, Kollaps]

            setupStats();
            setInterval(simulateDataInflow, 2500);
            animatePerspective();
        }

        function setupStats() {
            const labels = ["STABILITET", "ANGST_VEKTOR", "EGO_ISOLASJON", "NEVRALT_TAP"];
            statBars.innerHTML = labels.map(l => `
                <div class="space-y-1">
                    <div class="flex justify-between text-[8px] font-bold">
                        <span>${l}</span>
                        <span class="text-amber-500">0%</span>
                    </div>
                    <div class="h-1 bg-white/5 rounded-full overflow-hidden">
                        <div class="h-full bg-amber-500/50 transition-all duration-1000" style="width: 0%"></div>
                    </div>
                </div>
            `).join('');
        }

        async function simulateDataInflow() {
            const sample = chatMolecules[Math.floor(Math.random() * chatMolecules.length)];
            
            // Lag chat boble
            const bubble = document.createElement('div');
            bubble.className = "chat-bubble p-2 rounded-lg text-[9px] bg-white/5 border border-white/10 max-w-[90%]";
            bubble.innerHTML = `<span class="text-cyan-400 block mb-1">USER_ALPHA:</span> ${sample.text}`;
            chatStream.appendChild(bubble);
            if(chatStream.children.length > 6) chatStream.firstChild.remove();

            // Kjør gjennom modell
            const input = tf.tensor2d([[Math.random(), sample.weight, Math.random(), 0.5]]);
            const pred = model.predict(input);
            const data = await pred.data();

            updateUI(data, sample.weight);
            tf.dispose([input, pred]);
        }

        function updateUI(data, weight) {
            const bars = statBars.querySelectorAll('.h-full');
            const values = statBars.querySelectorAll('.text-amber-500');
            
            data.forEach((val, i) => {
                const percent = (val * 100).toFixed(1);
                bars[i].style.width = percent + "%";
                values[i].innerText = percent + "%";
            });

            const breakdownProb = (data[3] * 100).toFixed(1);
            breakdownMeter.innerText = breakdownProb + "%";
            pressureFill.style.width = (weight * 100) + "%";

            // Visualiser "angrepet" fra chatten
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", 0);
            line.setAttribute("y1", 200 + (Math.random()-0.5)*200);
            line.setAttribute("x2", 200);
            line.setAttribute("y2", 200);
            line.setAttribute("stroke", weight > 0.8 ? "var(--breakdown-red)" : "var(--neural-amber)");
            line.setAttribute("stroke-width", "2");
            line.setAttribute("class", "signal-wave");
            hitLines.appendChild(line);
            setTimeout(() => line.remove(), 2000);
        }

        let mouseX = 0, mouseY = 0;
        let curX = 0, curY = 0;

        function animatePerspective() {
            curX += (mouseX - curX) * 0.05;
            curY += (mouseY - curY) * 0.05;
            stage.style.transform = `rotateX(${curY}deg) rotateY(${curX}deg)`;
            requestAnimationFrame(animatePerspective);
        }

        window.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth - 0.5) * 15;
            mouseY = (e.clientY / window.innerHeight - 0.5) * -15;
        });

        window.onload = initNeuralScanner;
    </script>
</body>
</html>
