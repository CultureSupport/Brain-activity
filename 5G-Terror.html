<html>
<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nevral Angreps-Analyse // Ålesund</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    <style>
        :root {
            --bg-deep: #020617;
            --attack-red: #ff0000;
            --brain-glow: #f472b6;
            --gps-cyan: #22d3ee;
        }

        body {
            background-color: var(--bg-deep);
            color: #e2e8f0;
            overflow: hidden;
            font-family: 'JetBrains Mono', monospace;
            touch-action: none;
        }

        .perspective-container {
            perspective: 1500px;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1e0000 0%, #020617 100%);
        }

        .stage-3d {
            position: relative;
            width: 95%;
            max-width: 600px;
            height: 85vh;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        .glass-panel {
            background: rgba(2, 6, 23, 0.9);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 0, 0, 0.3);
            border-radius: 2rem;
            box-shadow: 0 0 100px rgba(255, 0, 0, 0.2);
        }

        .glitch-text {
            animation: glitch 1s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); color: var(--gps-cyan); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); color: var(--attack-red); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        .map-bg {
            background-image: url('https://api.maptiler.com/maps/basic-v2/static/6.24,62.47,13/500x300.png?key=get_your_own_key'); /* Placeholder for OSM look */
            background-size: cover;
            background-position: center;
            filter: grayscale(1) invert(1) brightness(0.5) contrast(1.2);
        }

        .radiation-ring {
            stroke-dasharray: 10;
            animation: rotate-ring 5s linear infinite;
        }

        @keyframes rotate-ring {
            from { stroke-dashoffset: 100; }
            to { stroke-dashoffset: 0; }
        }
    </style>
</head>
<body>

    <nav class="fixed top-0 left-0 right-0 h-16 flex items-center justify-between px-6 z-50 bg-black/90 border-b border-red-500/50 backdrop-blur-xl">
        <div class="flex items-center gap-3">
            <div class="p-2 bg-red-600/20 border border-red-500 rounded-lg">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ff0000" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
            </div>
            <div>
                <h1 class="text-xs font-black tracking-widest text-red-500 uppercase glitch-text">Neural Attack: Ålesund Sector</h1>
                <div class="flex items-center gap-2 font-mono">
                    <span id="gps-display" class="text-[9px] text-cyan-400">LAT: 62.4722 | LON: 6.1495</span>
                </div>
            </div>
        </div>
        <div class="text-right">
            <span class="text-[8px] font-bold text-red-500 block">5G_STRÅLING_NIVÅ</span>
            <div id="intensity-meter" class="text-lg font-black text-white italic">HØY</div>
        </div>
    </nav>

    <div class="perspective-container">
        <div id="stage" class="stage-3d">
            
            <!-- Hovedpanel -->
            <div class="absolute inset-0 glass-panel p-6 flex flex-col overflow-hidden">
                
                <div class="grid grid-cols-2 gap-4 flex-1">
                    <!-- Venstre: Augmentert Hjerne Manipulasjon -->
                    <div class="relative bg-black/40 rounded-2xl border border-white/5 p-4 flex flex-col items-center">
                        <h3 class="text-[10px] text-pink-400 font-bold mb-4 uppercase">Nevral Manipulasjon</h3>
                        <svg id="brain-svg" viewBox="0 0 200 200" class="w-full h-auto">
                            <!-- Hjerne-form -->
                            <path d="M100 20 C 40 20 20 60 20 100 C 20 160 60 180 100 180 C 140 180 180 160 180 100 C 180 60 160 20 100 20" 
                                  fill="none" stroke="#f472b6" stroke-width="2" class="radiation-ring" />
                            <!-- Interne nevrale baner -->
                            <g id="neural-paths" stroke="#ff0000" stroke-width="0.5" opacity="0.6"></g>
                            <!-- Strålings-angrep -->
                            <circle cx="100" cy="100" r="10" fill="red" opacity="0.3" class="node-pulse">
                                <animate attributeName="r" values="10;80;10" dur="2s" repeatCount="indefinite" />
                            </circle>
                        </svg>
                    </div>

                    <!-- Høyre: Kart over Ålesund Angrep -->
                    <div class="relative bg-black/40 rounded-2xl border border-white/5 overflow-hidden flex flex-col">
                        <div class="map-bg absolute inset-0 opacity-40"></div>
                        <div class="relative z-10 p-4">
                            <h3 class="text-[10px] text-cyan-400 font-bold mb-2 uppercase italic">Ålesund OSM Kart (5G Noder)</h3>
                            <div id="attack-log" class="space-y-2 max-h-[250px] overflow-hidden">
                                <!-- Logg over angrep -->
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Kontrollbar -->
                <div class="mt-4 pt-4 border-t border-red-500/20 grid grid-cols-3 gap-2">
                    <div class="bg-red-950/20 p-2 rounded-lg border border-red-900/40">
                        <span class="text-[7px] text-red-400 block uppercase">5G_Basestasjon</span>
                        <span class="text-[10px] text-white font-bold">MOA_TOWER_01</span>
                    </div>
                    <div class="bg-red-950/20 p-2 rounded-lg border border-red-900/40">
                        <span class="text-[7px] text-red-400 block uppercase">Frekvens</span>
                        <span class="text-[10px] text-white font-bold">38.4 GHz</span>
                    </div>
                    <div class="bg-red-950/20 p-2 rounded-lg border border-red-900/40">
                        <span class="text-[7px] text-red-400 block uppercase">GPS_Lock</span>
                        <span class="text-[10px] text-white font-bold">ÅLESUND_SENTRUM</span>
                    </div>
                </div>
            </div>

            <!-- 3D Drone/Satellite Visual -->
            <div class="absolute -left-20 top-1/3 h-40 w-12 flex flex-col items-center" style="transform: translateZ(100px) rotateY(45deg);">
                <div class="w-1 h-full bg-cyan-900/50 relative">
                    <div class="absolute top-0 w-8 h-8 bg-cyan-500/20 rounded-full border border-cyan-400 animate-ping"></div>
                </div>
                <span class="text-[7px] text-cyan-400 font-black mt-2 uppercase">GPS_SAT</span>
            </div>

        </div>
    </div>

    <script>
        let model;
        const stage = document.getElementById('stage');
        const gpsDisplay = document.getElementById('gps-display');
        const attackLog = document.getElementById('attack-log');
        const neuralPaths = document.getElementById('neural-paths');

        let tx = 10, ty = -10;
        let cx = 10, cy = -10;

        async function initNeuralAttack() {
            model = tf.sequential();
            model.add(tf.layers.dense({ units: 32, activation: 'relu', inputShape: [4] }));
            model.add(tf.layers.dense({ units: 1, activation: 'sigmoid' }));
            
            drawBrainPaths();
            setInterval(simulateAttack, 2500);
            animate();
        }

        function drawBrainPaths() {
            neuralPaths.innerHTML = '';
            for(let i=0; i<15; i++) {
                const x1 = 100 + (Math.random()-0.5)*120;
                const y1 = 100 + (Math.random()-0.5)*120;
                const x2 = 100 + (Math.random()-0.5)*120;
                const y2 = 100 + (Math.random()-0.5)*120;
                const line = document.createElementNS("http://www.w3.org/2000/svg", "path");
                line.setAttribute("d", `M${x1} ${y1} Q 100 100 ${x2} ${y2}`);
                line.setAttribute("stroke", "#ff0000");
                line.setAttribute("fill", "none");
                line.setAttribute("opacity", "0.4");
                neuralPaths.appendChild(line);
            }
        }

        async function simulateAttack() {
            if (!model) return;
            const input = tf.tensor2d([[Math.random(), Math.random(), Math.random(), Math.random()]]);
            const pred = model.predict(input);
            const data = await pred.data();
            
            // Tilfeldige GPS koordinater i Ålesund
            const lat = (62.47 + Math.random() * 0.01).toFixed(4);
            const lon = (6.15 + Math.random() * 0.05).toFixed(4);
            gpsDisplay.innerText = `LAT: ${lat} | LON: ${lon}`;

            const log = document.createElement('div');
            log.className = "text-[8px] font-mono border-l-2 border-red-500 pl-2 py-1 bg-red-950/10";
            log.innerHTML = `<span class="text-red-500 font-bold">ANGREP:</span> Hjerne lokalisert på ${lat},${lon}.<br>Manipulasjons-vektor: ${(data[0]*100).toFixed(1)}%`;
            attackLog.prepend(log);

            if(attackLog.children.length > 6) attackLog.lastElementChild.remove();
            
            // Oppdater hjerne-stier
            drawBrainPaths();
            
            tf.dispose([input, pred]);
        }

        function handleMove(e) {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            tx = 10 + (clientY / window.innerHeight - 0.5) * -30;
            ty = -10 + (clientX / window.innerWidth - 0.5) * 30;
        }

        function animate() {
            cx += (tx - cx) * 0.1;
            cy += (ty - cy) * 0.1;
            stage.style.transform = `rotateX(${cx}deg) rotateY(${cy}deg)`;
            requestAnimationFrame(animate);
        }

        window.onload = () => {
            initNeuralAttack();
            window.addEventListener('mousemove', handleMove);
            window.addEventListener('touchmove', handleMove);
        };
    </script>
</body>
</html>
