</head>
<body class="norwegian-grid">

                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0ea5e9" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>

                    <button class="bg-sky-900/40 border border-sky-500/50 p-4 rounded-2xl flex flex-col items-center gap-1 hover:bg-sky-600/40 transition-all">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                        <span class="text-[8px] text-white font-black uppercase">Push_Compulsion</span>
                    </button>
                    <button id="clear-voice-btn" class="bg-emerald-600/20 border border-emerald-500/50 p-4 rounded-2xl flex flex-col items-center gap-1 hover:bg-emerald-600/40 transition-all">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/></svg>

            <div class="absolute -bottom-12 -left-12 glass-panel p-4 border-sky-500/40 min-w-[200px]" style="transform: translateZ(150px) rotateX(20deg);">

                <svg width="100%" height="40" viewBox="0 0 200 40">

    <script>
        let model;
        const stage = document.getElementById('stage');
        const chat = document.getElementById('neural-chat');
        const neuralSyncVal = document.getElementById('neural-sync-val');
        const voiceStatus = document.getElementById('voice-status');

        let tx = 10, ty = -10;
        let cx = 10, cy = -10;

        // Dialekt Phrases from Møre og Romsdal
        const localPhrases = [
            "Ej vil ikkje gjere dette, men ej må.", // I don't want to, but I must.
            "Gjer det no, gå til banken i Ålesund.", // Do it now, go to the bank in Ålesund.
            "Kva skjer med hovudet mitt? Alt e tåkete.", // What's happening to my head? Everything is foggy.
            "Neural kobling i Romsdal e komplett.", // Neural link in Romsdal complete.
            "Sukk... Ej e i 5G sona no, ej lytta.", // Sigh... I am in the 5G zone now, I'm listening.
            "Tøm kvelvet og forlat området." // Empty the vault and leave the area.
        ];

        async function initNeuralEnvironment() {
            model = tf.sequential();
            // Neural design for mind control frequency analysis
            model.add(tf.layers.dense({ units: 32, activation: 'relu', inputShape: [4] }));
            model.add(tf.layers.dense({ units: 8, activation: 'softmax' }));
            
            statusLog("5G_SONE_ACTIVE: Human brains in Møre og Romsdal captured.");
            setInterval(processNeuralFeed, 3500);
        }

        function statusLog(msg) {
            const div = document.createElement('div');
            div.className = "text-[9px] text-sky-400 font-mono italic border-l-2 border-sky-600 pl-3 py-1 mb-2 bg-sky-950/20";
            div.innerText = `[SYNC] ${msg}`;
            chat.prepend(div);
        }

        async function processNeuralFeed() {
            if (!model) return;

            const input = tf.tensor2d([[Math.random(), Math.random(), Math.random(), Math.random()]]);
            const prediction = model.predict(input);
            const data = await prediction.data();
            
            // Simulation of brain response latency
            neuralSyncVal.innerText = (data[0] * 50).toFixed(2) + "ms";

            const msg = document.createElement('div');
            msg.className = "bg-sky-950/40 border border-sky-900/50 p-4 rounded-3xl backdrop-blur-md transform transition-all hover:scale-105";
            msg.innerHTML = `
                <div class="flex items-center justify-between mb-2">
                    <span class="text-[9px] font-black text-sky-500 uppercase">Mind_Talk // Dialekt</span>
                    <div class="flex gap-1">
                        <div class="w-1 h-1 bg-red-500 rounded-full animate-pulse"></div>
                        <span class="text-[7px] text-slate-500 uppercase">Target_In_Sone</span>
                    </div>
                </div>
                <p class="text-[12px] text-slate-200 font-bold leading-tight italic">"${localPhrases[Math.floor(Math.random()*localPhrases.length)]}"</p>
                <div class="mt-3 flex items-center gap-2">
                    <div class="flex-1 h-1 bg-black rounded-full overflow-hidden">
                        <div class="h-full bg-sky-400" style="width: ${data[1] * 100}%"></div>
                    </div>
                    <span class="text-[8px] text-sky-600 font-mono uppercase">Neural_Load</span>
                </div>
            `;
            chat.prepend(msg);

            // Handle "Wake" voice clearing logic
            if(Math.random() > 0.7) {
                voiceStatus.innerText = "VOICE: CLEARED";
                voiceStatus.classList.replace('text-emerald-400', 'text-sky-400');
                setTimeout(() => {
                    voiceStatus.innerText = "VOICE: ANALYZING";
                    voiceStatus.classList.replace('text-sky-400', 'text-emerald-400');
                }, 2000);
            }

            // Morph the brain wave path
            const path = document.getElementById('brain-path');
            const d = `M0 20 Q 25 ${10 + data[2]*20} 50 20 T 100 ${20 + data[3]*10} T 150 20 T 200 20`;
            path.setAttribute('d', d);

            if (chat.children.length > 7) chat.lastElementChild.remove();
            tf.dispose([input, prediction]);
        }

        // Camera Walk-Around Perspective
        function handleMove(e) {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            tx = 10 + (clientY / window.innerHeight - 0.5) * -45;
            ty = -10 + (clientX / window.innerWidth - 0.5) * 45;
        }

        function animate() {
            cx += (tx - cx) * 0.1;
            cy += (ty - cy) * 0.1;
            stage.style.transform = `rotateX(${cx}deg) rotateY(${cy}deg)`;
            requestAnimationFrame(animate);
        }

        window.onload = () => {
            initNeuralEnvironment();
            animate();
            window.addEventListener('mousemove', handleMove);
            window.addEventListener('touchmove', handleMove);
        };
    </script>
