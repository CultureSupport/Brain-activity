<html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Core 3D // Mobile View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    <style>
        :root {
            --bg-deep: #050505;
            --accent-indigo: #6366f1;
            --accent-emerald: #10b981;
        }

        body {
            background-color: var(--bg-deep);
            color: #e2e8f0;
            overflow: hidden;
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
            touch-action: none;
        }

        .perspective-container {
            perspective: 1000px;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stage-3d {
            position: relative;
            width: 90%;
            max-width: 400px;
            height: 70vh;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .comment-card {
            transform-style: preserve-3d;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .grid-bg {
            background-image: radial-gradient(circle at 2px 2px, rgba(99, 102, 241, 0.15) 1px, transparent 0);
            background-size: 30px 30px;
        }

        @keyframes pulse-emerald {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.5; }
        }
        .status-dot {
            animation: pulse-emerald 2s infinite;
        }
    </style>
</head>
<body class="grid-bg">

    <!-- Top Navigation -->
    <nav class="fixed top-0 left-0 right-0 h-16 flex items-center justify-between px-6 z-50 bg-black/40 backdrop-blur-md border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center shadow-lg shadow-indigo-500/30">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M9 9h6v6H9z"/></svg>
            </div>
            <div>
                <h1 class="text-sm font-black tracking-tighter italic uppercase">Core_Mobile</h1>
                <div class="flex items-center gap-1.5">
                    <div class="w-1.5 h-1.5 bg-emerald-500 rounded-full status-dot"></div>
                    <span id="status-text" class="text-[9px] font-mono text-emerald-500 uppercase">Syncing Buffer...</span>
                </div>
            </div>
        </div>
        <div class="w-9 h-9 rounded-full border border-indigo-500/30 p-0.5">
            <img src="https://api.dicebear.com/7.x/shapes/svg?seed=Alpha" class="w-full h-full rounded-full" alt="User">
        </div>
    </nav>

    <!-- 3D Environment -->
    <div class="perspective-container">
        <div id="stage" class="stage-3d">
            <!-- Main Feed -->
            <div class="absolute inset-0 glass-panel p-6 flex flex-col shadow-2xl">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-lg font-bold">Neural Feed</h2>
                    <div id="softmax-tag" class="px-2 py-0.5 bg-indigo-500/20 border border-indigo-500/40 rounded-full text-[9px] font-mono text-indigo-400">
                        RELU_ACT: 0.00
                    </div>
                </div>

                <!-- Scrollable Buffer -->
                <div id="feed-buffer" class="flex-1 space-y-4 overflow-visible py-4">
                    <!-- Dynamic Content Injected Here -->
                </div>

                <!-- Footer Interaction -->
                <div class="mt-4 pt-4 border-t border-white/5 flex justify-around items-center">
                    <button class="p-3 text-indigo-400 bg-indigo-500/10 rounded-2xl"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></button>
                    <button class="p-4 bg-indigo-600 rounded-2xl shadow-lg -translate-y-4 shadow-indigo-600/40 text-white"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 5v14M5 12h14"/></svg></button>
                    <button class="p-3 text-slate-500"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.1a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg></button>
                </div>
            </div>

            <!-- Floating Data Decors -->
            <div class="absolute -top-6 -right-6 glass-panel p-3 border-emerald-500/30 scale-75 origin-top-right" style="transform: translateZ(40px)">
                <div class="flex items-center gap-2 mb-2">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
                    <span class="text-[8px] font-bold text-emerald-400">DEPTH_MAP</span>
                </div>
                <div id="mini-viz" class="flex items-end gap-1 h-8 w-20">
                    <!-- Bars Injected Here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        let model;
        const stage = document.getElementById('stage');
        const buffer = document.getElementById('feed-buffer');
        const miniViz = document.getElementById('mini-viz');
        const statusText = document.getElementById('status-text');
        const softmaxTag = document.getElementById('softmax-tag');

        // Perspective State
        let targetX = 15;
        let targetY = -15;
        let currentX = 15;
        let currentY = -15;

        // Initialize TensorFlow Model
        async function initML() {
            model = tf.sequential();
            model.add(tf.layers.dense({ units: 16, activation: 'relu', inputShape: [4] }));
            model.add(tf.layers.dense({ units: 8, activation: 'softmax' }));
            statusText.innerText = "ML_CORE // ACTIVE";
        }

        // Handle Walk-Around Perspective (Touch and Mouse)
        function updatePerspective(e) {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const x = (clientX / window.innerWidth - 0.5) * 40;
            const y = (clientY / window.innerHeight - 0.5) * -40;
            targetX = 10 + y;
            targetY = -10 + x;
        }

        function animate() {
            currentX += (targetX - currentX) * 0.1;
            currentY += (targetY - currentY) * 0.1;
            stage.style.transform = `rotateX(${currentX}deg) rotateY(${currentY}deg)`;
            requestAnimationFrame(animate);
        }

        // Generate Comments based on ML Output
        async function injectComment() {
            if (!model) return;

            const input = tf.tensor2d([[Math.random(), Math.random(), Math.random(), Math.random()]]);
            const prediction = model.predict(input);
            const data = await prediction.data();

            softmaxTag.innerText = `RELU_ACT: ${data[0].toFixed(3)}`;

            const usernames = ["Quantum_X", "Neural_B", "Mesh_Flow", "Soft_Dev"];
            const msgs = ["Structure is loading...", "Syncing ReLU layers", "3D Feed active", "MQTT ping: 2ms"];
            
            const user = usernames[Math.floor(Math.random() * usernames.length)];
            const text = msgs[Math.floor(Math.random() * msgs.length)];
            const z = Math.random() * 150 - 75;

            const comment = document.createElement('div');
            comment.className = 'comment-card bg-black/40 border border-white/10 p-4 rounded-2xl backdrop-blur-md';
            comment.style.transform = `translateZ(${z}px)`;
            comment.innerHTML = `
                <div class="flex gap-3">
                    <div class="w-8 h-8 rounded-lg bg-slate-800 overflow-hidden">
                        <img src="https://api.dicebear.com/7.x/identicon/svg?seed=${user}">
                    </div>
                    <div class="flex-1">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[10px] font-bold text-indigo-300">${user}</span>
                            <span class="text-[8px] text-slate-500">NOW</span>
                        </div>
                        <p class="text-xs text-slate-300">${text}</p>
                    </div>
                    <svg width="24" height="24" class="opacity-50 text-indigo-400">
                        <circle cx="12" cy="12" r="${6 + data[1] * 6}" fill="none" stroke="currentColor" stroke-width="1.5" />
                    </svg>
                </div>
            `;

            buffer.prepend(comment);
            if (buffer.children.length > 4) buffer.lastElementChild.remove();

            // Update Mini Viz
            miniViz.innerHTML = '';
            Array.from(data).slice(0, 6).forEach(v => {
                const bar = document.createElement('div');
                bar.className = 'bg-emerald-400/50 w-full rounded-t-sm transition-all duration-500';
                bar.style.height = `${v * 100}%`;
                miniViz.appendChild(bar);
            });

            tf.dispose([input, prediction]);
        }

        window.onload = () => {
            initML();
            animate();
            setInterval(injectComment, 3500);
            
            window.addEventListener('mousemove', updatePerspective);
            window.addEventListener('touchstart', (e) => updatePerspective(e));
            window.addEventListener('touchmove', (e) => updatePerspective(e));
        };
    </script>
</body>
</html>
