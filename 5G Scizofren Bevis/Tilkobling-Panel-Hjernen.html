<html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neural Design // Mind Talk Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    <style>
        :root {
            --bg-deep: #020617;
            --accent-indigo: #6366f1;
            --accent-emerald: #10b981;
            --mast-red: #ef4444;
        }

        body {
            background-color: var(--bg-deep);
            color: #e2e8f0;
            overflow: hidden;
            font-family: 'JetBrains Mono', ui-monospace, monospace;
            touch-action: none;
        }

        .perspective-container {
            perspective: 1200px;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stage-3d {
            position: relative;
            width: 95%;
            max-width: 450px;
            height: 75vh;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        .glass-panel {
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 1.5rem;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
        }

        .signal-wave {
            stroke-dasharray: 100;
            animation: wave-flow 2s linear infinite;
        }

        @keyframes wave-flow {
            to { stroke-dashoffset: -200; }
        }

        .voice-pulse {
            animation: voice-scale 1.5s ease-in-out infinite;
        }

        @keyframes voice-scale {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.5); opacity: 0.8; }
        }

        .grid-bg {
            background-image: 
                linear-gradient(rgba(99, 102, 241, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }
    </style>
</head>
<body class="grid-bg">

    <!-- Global Header: Design Neural Network -->
    <nav class="fixed top-0 left-0 right-0 h-16 flex items-center justify-between px-6 z-50 bg-slate-950/80 border-b border-indigo-500/20 backdrop-blur-xl">
        <div class="flex items-center gap-3">
            <div class="p-2 bg-indigo-600/20 border border-indigo-500/50 rounded-lg">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2"><path d="M12 2v8m0 4v8m-7-9h14M5 12a7 7 0 1 1 14 0 7 7 0 0 1-14 0z"/></svg>
            </div>
            <div>
                <h1 class="text-xs font-bold tracking-[0.2em] text-indigo-400 uppercase">Neural Network Design</h1>
                <div class="flex items-center gap-2">
                    <span class="text-[9px] text-slate-500">MIND_TALK_PROTOCOL_v4</span>
                </div>
            </div>
        </div>
        <div class="flex gap-4 items-center">
            <div id="ai-voice-indicator" class="w-8 h-8 rounded-full border border-indigo-500/30 flex items-center justify-center">
                <div class="w-2 h-2 bg-indigo-500 rounded-full voice-pulse"></div>
            </div>
        </div>
    </nav>

    <div class="perspective-container">
        <div id="stage" class="stage-3d">
            
            <!-- Core Management Interface -->
            <div class="absolute inset-0 glass-panel p-6 flex flex-col overflow-hidden">
                <!-- Mast & WiFi Visualization Header -->
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h2 class="text-sm font-black text-white mb-1">AREA_HUMAN_INTERACT</h2>
                        <div class="flex gap-2">
                            <span class="text-[8px] bg-red-500/20 text-red-400 px-1.5 py-0.5 rounded border border-red-500/30">MOBILE_MAST: ACTIVE</span>
                            <span class="text-[8px] bg-blue-500/20 text-blue-400 px-1.5 py-0.5 rounded border border-blue-500/30">WIFI_MESH: CONNECTED</span>
                        </div>
                    </div>
                    <div id="tf-status" class="text-right">
                        <div class="text-[10px] font-mono text-indigo-400">SOFTMAX_DIST</div>
                        <div id="softmax-val" class="text-[14px] font-bold text-white">0.000</div>
                    </div>
                </div>

                <!-- Neural Chat Buffer -->
                <div id="neural-chat" class="flex-1 space-y-4 overflow-y-auto pr-2 custom-scrollbar">
                    <!-- Messages will appear here -->
                </div>

                <!-- Neural Control Pad -->
                <div class="mt-4 pt-4 border-t border-white/10 grid grid-cols-3 gap-2">
                    <button class="bg-indigo-600/20 border border-indigo-500/30 p-3 rounded-xl flex flex-col items-center gap-1 group hover:bg-indigo-600/40 transition-all">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                        <span class="text-[8px] text-indigo-300 uppercase">Scan Area</span>
                    </button>
                    <button id="mind-talk-btn" class="bg-indigo-600 border border-indigo-400 p-3 rounded-xl flex flex-col items-center gap-1 shadow-lg shadow-indigo-600/20 active:scale-95">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 18v5M8 23h8"/></svg>
                        <span class="text-[8px] text-white uppercase font-bold">Mind Talk</span>
                    </button>
                    <button class="bg-slate-800/50 border border-white/10 p-3 rounded-xl flex flex-col items-center gap-1">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><circle cx="12" cy="20" r="1"/></svg>
                        <span class="text-[8px] text-slate-400 uppercase">WiFi_Sync</span>
                    </button>
                </div>
            </div>

            <!-- 3D Mobile Mast Decorator -->
            <div class="absolute -left-12 top-20 h-40 w-8 flex flex-col items-center" style="transform: translateZ(60px) rotateY(45deg);">
                <div class="w-1 h-full bg-slate-700 relative">
                    <div class="absolute top-0 -left-2 w-5 h-2 bg-red-500/50 rounded-full animate-pulse"></div>
                    <div class="absolute top-4 -left-4 w-9 h-1 bg-indigo-500/40"></div>
                </div>
                <svg width="60" height="60" class="absolute -top-10 text-red-500/20">
                    <circle cx="30" cy="30" r="20" fill="none" stroke="currentColor" stroke-width="0.5" class="voice-pulse" />
                </svg>
            </div>

            <!-- Neural Data Stream Overlay -->
            <div class="absolute -bottom-10 -right-10 glass-panel p-4 border-emerald-500/20 min-w-[150px]" style="transform: translateZ(100px) rotateX(-10deg);">
                <div class="text-[8px] font-bold text-emerald-400 mb-2 tracking-widest">RELU_VOICE_PROMPT</div>
                <div id="voice-viz" class="h-10 flex items-center gap-0.5">
                    <!-- Audio-style bars injected -->
                </div>
            </div>

        </div>
    </div>

    <script>
        let model;
        const stage = document.getElementById('stage');
        const chat = document.getElementById('neural-chat');
        const voiceViz = document.getElementById('voice-viz');
        const softmaxVal = document.getElementById('softmax-val');

        // Perspective Variables
        let tx = 10, ty = -10;
        let cx = 10, cy = -10;

        // Initialize Neural Network Design
        async function initNeuralCore() {
            model = tf.sequential();
            // Designing a ReLU-activated model for "Human Interaction State"
            model.add(tf.layers.dense({ units: 24, activation: 'relu', inputShape: [5] }));
            model.add(tf.layers.dense({ units: 12, activation: 'relu' }));
            model.add(tf.layers.dense({ units: 1, activation: 'softmax' }));
            
            logSystem("NEURAL_DESIGN_READY: ReLU/Softmax configured.");
            startSimulation();
        }

        function logSystem(msg) {
            const div = document.createElement('div');
            div.className = "text-[9px] text-indigo-400/80 font-mono italic border-l border-indigo-500/30 pl-2 py-1";
            div.innerText = `[SYS] ${msg}`;
            chat.prepend(div);
        }

        async function processInteraction() {
            if (!model) return;

            // Input: [WiFi_Strength, Mast_Dist, Human_Density, Voice_Freq, Mind_Sync]
            const input = tf.tensor2d([[Math.random(), Math.random(), Math.random(), Math.random(), Math.random()]]);
            const prediction = model.predict(input);
            const data = await prediction.data();

            softmaxVal.innerText = data[0].toFixed(5);
            
            // Randomly trigger "Mind Talk" or "Computer Management" alerts
            const triggers = [
                "Mast_Interference: Re-routing Neural Data.",
                "WiFi_Mesh: Optimizing human living area pathing.",
                "Mind_Talk: Syncing collective neural prompt.",
                "System: Computer management voice active in sector 7."
            ];

            const msg = document.createElement('div');
            msg.className = "bg-white/5 border border-white/5 p-3 rounded-xl transform transition-all hover:scale-[1.02]";
            msg.innerHTML = `
                <div class="flex items-center gap-2 mb-1">
                    <span class="text-[10px] font-bold text-white uppercase">Neural_Design_Unit</span>
                    <span class="text-[7px] text-indigo-500/50">RELU_PROMPT</span>
                </div>
                <p class="text-[11px] text-slate-300 leading-tight">${triggers[Math.floor(Math.random()*triggers.length)]}</p>
                <div class="mt-2 h-1 bg-white/5 rounded-full overflow-hidden">
                    <div class="h-full bg-indigo-500" style="width: ${data[0] * 10000}%"></div>
                </div>
            `;
            chat.prepend(msg);

            // Update Voice Viz
            voiceViz.innerHTML = '';
            for(let i=0; i<15; i++) {
                const bar = document.createElement('div');
                const h = Math.random() * 100;
                bar.className = "bg-indigo-400 w-1 rounded-full transition-all duration-300";
                bar.style.height = `${h}%`;
                voiceViz.appendChild(bar);
            }

            if (chat.children.length > 10) chat.lastElementChild.remove();
            tf.dispose([input, prediction]);
        }

        function startSimulation() {
            setInterval(processInteraction, 4000);
        }

        // 3D Walk-Around Logic
        function handleMove(e) {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const x = (clientX / window.innerWidth - 0.5) * 45;
            const y = (clientY / window.innerHeight - 0.5) * -45;
            tx = 10 + y;
            ty = -10 + x;
        }

        function animate() {
            cx += (tx - cx) * 0.1;
            cy += (ty - cy) * 0.1;
            stage.style.transform = `rotateX(${cx}deg) rotateY(${cy}deg)`;
            requestAnimationFrame(animate);
        }

        window.onload = () => {
            initNeuralCore();
            animate();
            window.addEventListener('mousemove', handleMove);
            window.addEventListener('touchmove', handleMove);
        };
    </script>
</body>
</html>
